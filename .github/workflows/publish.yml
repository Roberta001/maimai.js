name: NPM Publish (Provenance OIDC)

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger only on version tags like v1.0.1
  workflow_dispatch: # Enable manual triggering from UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # MUST have this permission to allow OIDC token provision
      contents: read   # Allows reading the repository contents
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build Library
        run: npm run build

      - name: Publish to NPM with Provenance
        run: npm publish --provenance --access public
